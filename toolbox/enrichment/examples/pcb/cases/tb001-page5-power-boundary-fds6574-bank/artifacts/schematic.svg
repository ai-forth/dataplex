<text x="80" y="68" font-family="monospace" font-size="14" fill="#52606d">Alternate TB001 page-5/page-4 boundary model: the page-4-derived control signal still drives a DMN-class NMOS gate pull-down, but the unresolved FDS6574 family is treated as a stronger composite PMOS pass bank rather than a single pass element.</text>
